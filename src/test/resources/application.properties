spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

oauth2.issuer-uri=http://localhost:7189
spring.security.oauth2.resourceserver.jwt.issuer-uri=${oauth2.issuer-uri}

oauth2.client.id=test-client
oauth2.client.secret=test-secret
oauth2.client.redirect-uri=http://127.0.0.1:7189/login/oauth2/code/test-client
oauth2.client.access-token-validity-seconds=3600
oauth2.client.refresh-token-validity-seconds=86400

oauth2.user.username=testuser
oauth2.user.password=password
