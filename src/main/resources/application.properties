#Do not change the property name, you can change the value if needed
spring.application.name=PatientManagement
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=7189
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/test_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create
# Show or not log for each SQL query
spring.jpa.show-sql=true

jwt.secret=ThisIsASecretKeyForJWTAuthenticationThatIsLongEnoughForHS512AlgorithmRequirement
jwt.expiration=3600000
